<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: sans-serif;
    }

    .calc {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .display {
      background: #0f3460;
      border-radius: 8px;
      padding: 16px;
      text-align: right;
      font-size: 36px;
      color: #e8eaf6;
      font-family: monospace;
      margin-bottom: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 66px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      height: 58px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      background: #1a2744;
      color: #e8eaf6;
      transition: background 0.1s, transform 0.08s;
    }

    button:hover  { background: #223060; }
    button:active { transform: scale(0.94); }

    .op    { background: #0f3460; color: #90caf9; }
    .op:hover { background: #1a4a80; }

    .eq    { background: #e94560; color: #fff; grid-column: span 2; }
    .eq:hover { background: #f0556f; }

    .clear { background: #2a1a1a; color: #ef9a9a; grid-column: span 2; }
    .clear:hover { background: #3a1a1a; }
  </style>
</head>
<body>
<div class="calc">
  <div class="display" id="display">0</div>
  <div class="grid">
    <button class="clear" onclick="clearAll()">Clear</button>
    <button class="op" onclick="setOp('/')">÷</button>
    <button class="op" onclick="setOp('*')">×</button>

    <button onclick="digit('7')">7</button>
    <button onclick="digit('8')">8</button>
    <button onclick="digit('9')">9</button>
    <button class="op" onclick="setOp('-')">−</button>

    <button onclick="digit('4')">4</button>
    <button onclick="digit('5')">5</button>
    <button onclick="digit('6')">6</button>
    <button class="op" onclick="setOp('+')">+</button>

    <button onclick="digit('1')">1</button>
    <button onclick="digit('2')">2</button>
    <button onclick="digit('3')">3</button>
    <button onclick="digit('0')">0</button>

    <button class="eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  // ── Core math functions ──────────────────────────
  function add(a, b)      { return a + b; }
  function subtract(a, b) { return a - b; }
  function multiply(a, b) { return a * b; }
  function divide(a, b)   { return a / b; }

  function operate(op, a, b) {
    if (op === '+') return add(a, b);
    if (op === '-') return subtract(a, b);
    if (op === '*') return multiply(a, b);
    if (op === '/') return divide(a, b);
  }

  // ── State ────────────────────────────────────────
  let firstNum   = null;
  let operator   = null;
  let currentStr = '0';
  let justEvaled = false;

  const display = document.getElementById('display');

  function updateDisplay(val) {
    display.textContent = val;
  }

  // ── Handlers ─────────────────────────────────────
  function digit(val) {
    if (justEvaled) {
      currentStr = val;
      firstNum = null;
      operator = null;
      justEvaled = false;
    } else {
      currentStr = currentStr === '0' ? val : currentStr + val;
    }
    updateDisplay(currentStr);
  }

  function setOp(op) {
    const current = parseFloat(currentStr);

    // chain: evaluate previous pair first
    if (firstNum !== null && operator !== null && !justEvaled) {
      const result = runOperate(operator, firstNum, current);
      if (result === null) return;
      firstNum = result;
      updateDisplay(firstNum);
      currentStr = String(firstNum);
    } else {
      firstNum = current;
    }

    operator   = op;
    justEvaled = false;
    currentStr = '0';
  }

  function calculate() {
    if (firstNum === null || operator === null) return;

    const second = parseFloat(currentStr);
    const result = runOperate(operator, firstNum, second);
    if (result === null) return;

    currentStr = String(result);
    firstNum   = null;
    operator   = null;
    justEvaled = true;
    updateDisplay(result);
  }

  function runOperate(op, a, b) {
    if (op === '/' && b === 0) {
      updateDisplay("Don't divide by 0!");
      currentStr = '0'; firstNum = null; operator = null; justEvaled = false;
      return null;
    }
    const result = operate(op, a, b);
    // round to avoid floating point mess
    return parseFloat(result.toPrecision(10));
  }

  function clearAll() {
    firstNum = null; operator = null;
    currentStr = '0'; justEvaled = false;
    updateDisplay('0');
  }
</script>
</body>
</html>
